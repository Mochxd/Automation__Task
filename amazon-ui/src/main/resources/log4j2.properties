############################
## Log4j2 configuration   ##
############################

# Base directory for UI logs
property.basePath=test-outputs/Logs

############################
## File / rolling appender##
############################

# Main rolling file appender (keeps log history per day and size)
appender.rolling.type=RollingFile
appender.rolling.name=rollingAppender
appender.rolling.fileName=${basePath}/logs.log
appender.rolling.filePattern=${basePath}/logs-%d{yyyy-MM-dd}-%i.log.log
appender.rolling.layout.type=PatternLayout
appender.rolling.layout.disableAnsi=false
appender.rolling.filter.threshold.type=ThresholdFilter
appender.rolling.filter.threshold.level=info
appender.rolling.layout.pattern=[%p] - [%d{dd-MM-yyyy HH:mm:ss}] [%t] [%c] - %msg%n

# Rotate when file grows large and at most once per day
appender.rolling.policies.type=Policies
appender.rolling.policies.size.type=SizeBasedTriggeringPolicy
appender.rolling.policies.size.size=10MB
appender.rolling.policies.time.type=TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval=1

# Keep a reasonable number of old log files
appender.rolling.strategy.type=DefaultRolloverStrategy
appender.rolling.strategy.max=10

############################
## Console appender       ##
############################

appender.stdout.type=Console
appender.stdout.name=consoleAppender
appender.stdout.layout.type=PatternLayout
appender.stdout.layout.disableAnsi=false
appender.stdout.filter.threshold.type=ThresholdFilter
appender.stdout.filter.threshold.level=info
appender.stdout.layout.pattern=%highlight{[%p] - [%d{dd-MM-yyyy HH:mm:ss}] [%t] [%c] - %msg}{FATAL=red, ERROR=red bold, WARN=yellow bold, INFO=blue, DEBUG=green bold, TRACE=black}%n

############################
## Root logger            ##
############################

rootLogger=info, consoleAppender, rollingAppender
rootLogger.level=info
rootLogger.appenderRef.rolling.ref=rollingAppender
rootLogger.appenderRef.stdout.ref=consoleAppender
